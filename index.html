<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power BI Portal</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background-color: #f4f6f8;
    }

    /* Login page */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    .login-card h2 {
      margin-bottom: 10px;
      color: #333333;
      font-size: 24px;
    }

    .login-description {
      margin-bottom: 22px;
      color: #666666;
      font-size: 14px;
      line-height: 1.5;
    }

    .login-card input {
      width: 100%;
      padding: 13px;
      margin-bottom: 15px;
      border: 1px solid #cccccc;
      border-radius: 5px;
      font-size: 14px;
    }

    .login-card input:focus {
      border-color: #0078d4;
      outline: none;
      box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.15);
    }

    .login-card input:disabled {
      background-color: #eeeeee;
      cursor: not-allowed;
    }

    .login-card button {
      width: 100%;
      padding: 13px;
      color: #ffffff;
      background-color: #0078d4;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .login-card button:hover:not(:disabled) {
      background-color: #106ebe;
    }

    .login-card button:disabled {
      background-color: #a6a6a6;
      cursor: not-allowed;
    }

    .error-message {
      display: none;
      padding: 11px;
      margin-bottom: 15px;
      color: #b42318;
      background-color: #fef3f2;
      border: 1px solid #fecdca;
      border-radius: 5px;
      font-size: 14px;
      line-height: 1.4;
    }

    /* Dashboard page */
    #dashboard-view {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .dashboard-header {
      min-height: 60px;
      padding: 12px 20px;
      color: #ffffff;
      background-color: #0078d4;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .dashboard-header h3 {
      overflow: hidden;
      font-size: 18px;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dashboard-selector-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: bold;
    }

    .dashboard-selector {
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 600;
      color: #333333;
      background-color: #ffffff;
      border: 1px solid #cccccc;
      border-radius: 5px;
      outline: none;
      cursor: pointer;
    }

    .dashboard-selector:focus {
      border-color: #004578;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.4);
    }

    .dashboard-header button {
      flex-shrink: 0;
      padding: 8px 16px;
      color: #0078d4;
      background-color: #ffffff;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .dashboard-header button:hover {
      background-color: #f2f2f2;
    }

    #powerbi-frame {
      width: 100%;
      height: calc(100vh - 60px);
      border: none;
      background-color: #ffffff;
    }

    @media (max-width: 600px) {
      .login-card {
        padding: 28px 22px;
      }

      .dashboard-header {
        padding: 10px 15px;
      }

      .dashboard-header h3 {
        font-size: 15px;
      }

      .dashboard-selector-wrapper span {
        display: none; /* Hide 'Dashboard:' label on small screens */
      }

      .dashboard-selector {
        padding: 6px 10px;
        font-size: 13px;
      }

      .dashboard-header button {
        padding: 6px 10px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

  <!-- Login view -->
  <div id="login-view" class="login-container">
    <div class="login-card">
      <h2>Portal Access</h2>

      <p class="login-description">
        Enter your registered email address to access the Power BI dashboard.
      </p>

      <div id="error-message" class="error-message"></div>

      <form id="login-form">
        <input
          type="email"
          id="email-input"
          placeholder="Enter your email address"
          autocomplete="email"
          required
        >

        <button type="submit" id="login-button">
          Login
        </button>
      </form>
    </div>
  </div>

  <!-- Dashboard view -->
  <div id="dashboard-view">
    <header class="dashboard-header">
      <h3 id="welcome-message">Welcome</h3>

      <div class="header-controls">
        <div class="dashboard-selector-wrapper">
          <span>Dashboard:</span>
          <select id="dashboard-select" class="dashboard-selector">
            <!-- Options populated dynamically from DASHBOARDS array -->
          </select>
        </div>

        <button type="button" id="logout-button">
          Logout
        </button>
      </div>
    </header>

    <iframe
      id="powerbi-frame"
      src=""
      title="Power BI Dashboard"
      allowfullscreen
    ></iframe>
  </div>

  <script>
    /*
    ============================================================
    CONFIGURATION
    ============================================================
    */

    // Google Sheet containing the login whitelist.
    const GOOGLE_SHEET_ID = "1TcVbH-ccKUS1AC-oHEIqCAj4IAyS2DmQgywFMqD85HQ";

    // Exact worksheet tab name.
    const GOOGLE_SHEET_NAME = "Users";

    // Google Form used for the login record.
    const LOGIN_FORM_ID = "1FAIpQLSc8a96-q6g-pNqEXIBmLK7qrxHe5OSKCRkS3w8GHlqs1flTPQ";

    // Entry ID of the Email question.
    const LOGIN_EMAIL_ENTRY_ID = "entry.804019142";

    // Google Form submission endpoint.
    const LOGIN_FORM_URL = "https://docs.google.com/forms/d/e/" + LOGIN_FORM_ID + "/formResponse";

    // List of available Power BI reports. Add or modify reports here.
    const DASHBOARDS = [
      {
        id: "sales-overview",
        name: "Sales Overview",
        url: "https://app.powerbi.com/view?r=eyJrIjoiNWQxMjI1NmYtYTUyMi00ZGVhLWFlNDItMDk2MjNhNGE5NDVmIiwidCI6IjU3OGRiYWRkLWMzMmMtNGY1YS04YzQ0LTMzZGE0NGM3MTIwOSIsImMiOjEwfQ%3D%3D"
      },
      {
        id: "financial-report",
        name: "Financial Summary",
        url: "https://app.powerbi.com/view?r=YOUR_SECOND_REPORT_URL_HERE"
      },
      {
        id: "operations",
        name: "Operations & HR",
        url: "https://app.powerbi.com/view?r=YOUR_THIRD_REPORT_URL_HERE"
      }
    ];

    /*
    ============================================================
    APPLICATION STATE
    ============================================================
    */

    let isLoggedIn = false;

    /*
    ============================================================
    PAGE ELEMENTS
    ============================================================
    */

    const loginView = document.getElementById("login-view");
    const dashboardView = document.getElementById("dashboard-view");
    const loginForm = document.getElementById("login-form");
    const emailInput = document.getElementById("email-input");
    const loginButton = document.getElementById("login-button");
    const logoutButton = document.getElementById("logout-button");
    const errorMessage = document.getElementById("error-message");
    const welcomeMessage = document.getElementById("welcome-message");
    const powerBIFrame = document.getElementById("powerbi-frame");
    const dashboardSelect = document.getElementById("dashboard-select");

    /*
    ============================================================
    INITIALIZATION
    ============================================================
    */

    function initDashboardMenu() {
      dashboardSelect.innerHTML = "";
      DASHBOARDS.forEach((dashboard) => {
        const option = document.createElement("option");
        option.value = dashboard.url;
        option.textContent = dashboard.name;
        dashboardSelect.appendChild(option);
      });
    }

    // Populate dropdown menu options on load
    initDashboardMenu();

    /*
    ============================================================
    READ WHITELIST FROM GOOGLE SHEETS
    ============================================================
    */

    function getUsersFromGoogleSheet() {
      return new Promise((resolve, reject) => {
        const callbackName = "googleSheetCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const script = document.createElement("script");
        const query = "select A, B where A is not null";

        const requestTimeout = setTimeout(() => {
          cleanup();
          reject(new Error("The Google Sheet request timed out."));
        }, 15000);

        function cleanup() {
          clearTimeout(requestTimeout);
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }
        }

        window[callbackName] = function (response) {
          try {
            if (!response) {
              throw new Error("Google Sheets returned an empty response.");
            }

            if (response.status === "error") {
              const details =
                response.errors?.[0]?.detailed_message ||
                response.errors?.[0]?.message ||
                "Unknown Google Sheets error.";
              throw new Error(details);
            }

            const rows = response.table?.rows || [];
            const users = rows
              .map((row) => {
                const emailValue = row.c?.[0]?.v;
                const userNameValue = row.c?.[1]?.v;

                return {
                  email: emailValue ? String(emailValue).trim().toLowerCase() : "",
                  userName: userNameValue ? String(userNameValue).trim() : "User"
                };
              })
              .filter((user) => user.email !== "");

            cleanup();
            resolve(users);
          } catch (error) {
            cleanup();
            reject(error);
          }
        };

        script.onerror = function () {
          cleanup();
          reject(new Error("Unable to load the Google Sheet."));
        };

        const sheetURL =
          "https://docs.google.com/spreadsheets/d/" +
          encodeURIComponent(GOOGLE_SHEET_ID) +
          "/gviz/tq" +
          "?sheet=" +
          encodeURIComponent(GOOGLE_SHEET_NAME) +
          "&headers=1" +
          "&tq=" +
          encodeURIComponent(query) +
          "&tqx=" +
          encodeURIComponent("out:json;responseHandler:" + callbackName) +
          "&cacheBust=" +
          Date.now();

        script.src = sheetURL;
        script.async = true;
        document.body.appendChild(script);
      });
    }

    /*
    ============================================================
    RECORD SUCCESSFUL LOGIN
    ============================================================
    */

    function recordLogin(email) {
      const formData = new URLSearchParams();
      formData.append(LOGIN_EMAIL_ENTRY_ID, email);

      fetch(LOGIN_FORM_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: formData.toString(),
        keepalive: true
      }).catch((error) => {
        console.error("Unable to record login:", error);
      });
    }

    /*
    ============================================================
    LOGIN
    ============================================================
    */

    async function handleLogin(event) {
      event.preventDefault();
      hideError();

      const inputEmail = emailInput.value.trim().toLowerCase();

      if (!inputEmail) {
        showError("Please enter your email address.");
        emailInput.focus();
        return;
      }

      if (!emailInput.checkValidity()) {
        showError("Please enter a valid email address.");
        emailInput.focus();
        return;
      }

      setLoginLoading(true);

      try {
        const users = await getUsersFromGoogleSheet();
        const foundUser = users.find((user) => user.email === inputEmail);

        if (!foundUser) {
          showError("Access denied. This email address is not registered.");
          return;
        }

        recordLogin(foundUser.email);
        openDashboard(foundUser);
      } catch (error) {
        console.error("Login verification error:", error);
        showError("Unable to verify your email. Check the Google Sheet sharing, publishing settings, and tab name.");
      } finally {
        setLoginLoading(false);
      }
    }

    /*
    ============================================================
    OPEN DASHBOARD
    ============================================================
    */

    function openDashboard(user) {
      isLoggedIn = true;

      welcomeMessage.textContent = "Welcome, " + (user.userName || "User") + "!";
      
      // Load the currently selected option from the dropdown (or first by default)
      if (DASHBOARDS.length > 0) {
        powerBIFrame.src = dashboardSelect.value || DASHBOARDS[0].url;
      }

      loginView.style.display = "none";
      dashboardView.style.display = "flex";
    }

    /*
    ============================================================
    SWITCH DASHBOARD
    ============================================================
    */

    function handleDashboardChange(event) {
      const selectedUrl = event.target.value;
      if (selectedUrl) {
        powerBIFrame.src = selectedUrl;
      }
    }

    /*
    ============================================================
    LOGIN BUTTON STATE
    ============================================================
    */

    function setLoginLoading(isLoading) {
      loginButton.disabled = isLoading;
      emailInput.disabled = isLoading;
      loginButton.textContent = isLoading ? "Verifying..." : "Login";
    }

    /*
    ============================================================
    ERROR MESSAGE
    ============================================================
    */

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = "block";
    }

    function hideError() {
      errorMessage.textContent = "";
      errorMessage.style.display = "none";
    }

    /*
    ============================================================
    LOGOUT
    ============================================================
    */

    function logout() {
      isLoggedIn = false;
      powerBIFrame.src = "";
      welcomeMessage.textContent = "Welcome";

      dashboardView.style.display = "none";
      loginView.style.display = "flex";

      emailInput.value = "";
      emailInput.disabled = false;

      // Reset dropdown selection to first item
      if (dashboardSelect.options.length > 0) {
        dashboardSelect.selectedIndex = 0;
      }

      hideError();
      emailInput.focus();
    }

    /*
    ============================================================
    EVENT LISTENERS
    ============================================================
    */

    loginForm.addEventListener("submit", handleLogin);
    logoutButton.addEventListener("click", logout);
    dashboardSelect.addEventListener("change", handleDashboardChange);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power BI Portal</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background-color: #121212;
      color: #e0e0e0;
    }

    /* Login page - Industrial Minimalist */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      background: radial-gradient(circle at center, #1a1a1f 0%, #0d0d0f 100%);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background-color: #18181c;
      border: 1px solid #2d2d35;
      border-radius: 2px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
    }

    .login-card h2 {
      margin-bottom: 8px;
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-bottom: 2px solid #ff6b00;
      padding-bottom: 8px;
      display: inline-block;
    }

    .login-description {
      margin-top: 15px;
      margin-bottom: 25px;
      color: #9e9ea7;
      font-size: 13px;
      line-height: 1.5;
    }

    .login-card input {
      width: 100%;
      padding: 14px;
      margin-bottom: 18px;
      background-color: #0f0f12;
      border: 1px solid #3a3a45;
      border-radius: 2px;
      color: #ffffff;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .login-card input::placeholder {
      color: #5a5a66;
    }

    .login-card input:focus {
      border-color: #ff6b00;
      outline: none;
      box-shadow: 0 0 0 1px #ff6b00;
    }

    .login-card input:disabled {
      background-color: #151518;
      color: #5a5a66;
      cursor: not-allowed;
    }

    .login-card button {
      width: 100%;
      padding: 14px;
      color: #0d0d0f;
      background-color: #ff6b00;
      border: none;
      border-radius: 2px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .login-card button:hover:not(:disabled) {
      background-color: #e05e00;
    }

    .login-card button:disabled {
      background-color: #3a3a45;
      color: #7a7a85;
      cursor: not-allowed;
    }

    .error-message {
      display: none;
      padding: 12px;
      margin-bottom: 18px;
      color: #ff6b6b;
      background-color: #2a1515;
      border: 1px solid #5a2020;
      border-radius: 2px;
      font-size: 13px;
      line-height: 1.4;
    }

    /* Dashboard page */
    #dashboard-view {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .dashboard-header {
      min-height: 56px;
      padding: 10px 24px;
      color: #ffffff;
      background-color: #18181c;
      border-bottom: 1px solid #2d2d35;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .dashboard-header h3 {
      overflow: hidden;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #e0e0e0;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .dashboard-selector-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8e8e99;
    }

    .dashboard-selector {
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      background-color: #0f0f12;
      border: 1px solid #3a3a45;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .dashboard-selector:focus {
      border-color: #ff6b00;
    }

    .dashboard-header button {
      flex-shrink: 0;
      padding: 8px 16px;
      color: #ffffff;
      background-color: #2a2a32;
      border: 1px solid #3a3a45;
      border-radius: 2px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .dashboard-header button:hover {
      background-color: #3a3a45;
      border-color: #5a5a66;
    }

    #powerbi-frame {
      width: 100%;
      height: calc(100vh - 56px);
      border: none;
      background-color: #121212;
    }

    @media (max-width: 600px) {
      .login-card {
        padding: 30px 20px;
      }

      .dashboard-header {
        padding: 10px 15px;
      }

      .dashboard-header h3 {
        font-size: 13px;
      }

      .dashboard-selector-wrapper span {
        display: none;
      }

      .dashboard-selector {
        padding: 6px 10px;
        font-size: 12px;
      }

      .dashboard-header button {
        padding: 6px 10px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>

  <!-- Login view -->
  <div id="login-view" class="login-container">
    <div class="login-card">
      <h2>Portal Access</h2>

      <p class="login-description">
        Enter your registered email address to access operational analytics.
      </p>

      <div id="error-message" class="error-message"></div>

      <form id="login-form">
        <input
          type="email"
          id="email-input"
          placeholder="Enter user email address"
          autocomplete="email"
          required
        >

        <button type="submit" id="login-button">
          Authenticate
        </button>
      </form>
    </div>
  </div>

  <!-- Dashboard view -->
  <div id="dashboard-view">
    <header class="dashboard-header">
      <h3 id="welcome-message">System Active</h3>

      <div class="header-controls">
        <div class="dashboard-selector-wrapper">
          <span>View Mode:</span>
          <select id="page-select" class="dashboard-selector">
            <!-- Options populated dynamically from REPORT_PAGES array -->
          </select>
        </div>

        <button type="button" id="logout-button">
          Disconnect
        </button>
      </div>
    </header>

    <iframe
      id="powerbi-frame"
      src=""
      title="Power BI Dashboard"
      allowfullscreen
    ></iframe>
  </div>

  <script>
    /*
    ============================================================
    CONFIGURATION
    ============================================================
    */

    // Google Sheet containing the login whitelist.
    const GOOGLE_SHEET_ID = "1TcVbH-ccKUS1AC-oHEIqCAj4IAyS2DmQgywFMqD85HQ";

    // Exact worksheet tab name.
    const GOOGLE_SHEET_NAME = "Users";

    // Google Form used for the login record.
    const LOGIN_FORM_ID = "1FAIpQLSc8a96-q6g-pNqEXIBmLK7qrxHe5OSKCRkS3w8GHlqs1flTPQ";

    // Entry ID of the Email question.
    const LOGIN_EMAIL_ENTRY_ID = "entry.804019142";

    // Google Form submission endpoint.
    const LOGIN_FORM_URL = "https://docs.google.com/forms/d/e/" + LOGIN_FORM_ID + "/formResponse";

    // Base Power BI URL (public embed link)
    const POWER_BI_BASE_URL = "https://app.powerbi.com/view?r=eyJrIjoiNWQxMjI1NmYtYTUyMi00ZGVhLWFlNDItMDk2MjNhNGE5NDVmIiwidCI6IjU3OGRiYWRkLWMzMmMtNGY1YS04YzQ0LTMzZGE0NGM3MTIwOSIsImMiOjEwfQ%3D%3D";

    // Section IDs mapped to high-contrast menu items
    const REPORT_PAGES = [
      {
        name: "Sales Performance",
        sectionId: "bb254124c2e3ea4468dd"
      },
      {
        name: "Stock Devices",
        sectionId: "4257b26ca018b5b2da22"
      },
      {
        name: "Stock Accessories",
        sectionId: "f859f15a2c4020eb0103"
      },
      {
        name: "Stock Laptop",
        sectionId: "7c7a87475b7e273d59e6"
      },
      {
        name: "Stock CE",
        sectionId: "1b6d3f7dc80e90d77b8c"
      }         
    ];

    /*
    ============================================================
    APPLICATION STATE
    ============================================================
    */

    let isLoggedIn = false;

    /*
    ============================================================
    PAGE ELEMENTS
    ============================================================
    */

    const loginView = document.getElementById("login-view");
    const dashboardView = document.getElementById("dashboard-view");
    const loginForm = document.getElementById("login-form");
    const emailInput = document.getElementById("email-input");
    const loginButton = document.getElementById("login-button");
    const logoutButton = document.getElementById("logout-button");
    const errorMessage = document.getElementById("error-message");
    const welcomeMessage = document.getElementById("welcome-message");
    const powerBIFrame = document.getElementById("powerbi-frame");
    const pageSelect = document.getElementById("page-select");

    /*
    ============================================================
    INITIALIZATION
    ============================================================
    */

    function initPageMenu() {
      pageSelect.innerHTML = "";
      REPORT_PAGES.forEach((page) => {
        const option = document.createElement("option");
        
        if (page.sectionId) {
          option.value = POWER_BI_BASE_URL + "&pageName=" + encodeURIComponent(page.sectionId);
        } else {
          option.value = POWER_BI_BASE_URL;
        }

        option.textContent = page.name;
        pageSelect.appendChild(option);
      });
    }

    initPageMenu();

    /*
    ============================================================
    READ WHITELIST FROM GOOGLE SHEETS
    ============================================================
    */

    function getUsersFromGoogleSheet() {
      return new Promise((resolve, reject) => {
        const callbackName = "googleSheetCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const script = document.createElement("script");
        const query = "select A, B where A is not null";

        const requestTimeout = setTimeout(() => {
          cleanup();
          reject(new Error("The Google Sheet request timed out."));
        }, 15000);

        function cleanup() {
          clearTimeout(requestTimeout);
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }
        }

        window[callbackName] = function (response) {
          try {
            if (!response) {
              throw new Error("Google Sheets returned an empty response.");
            }

            if (response.status === "error") {
              const details =
                response.errors?.[0]?.detailed_message ||
                response.errors?.[0]?.message ||
                "Unknown Google Sheets error.";
              throw new Error(details);
            }

            const rows = response.table?.rows || [];
            const users = rows
              .map((row) => {
                const emailValue = row.c?.[0]?.v;
                const userNameValue = row.c?.[1]?.v;

                return {
                  email: emailValue ? String(emailValue).trim().toLowerCase() : "",
                  userName: userNameValue ? String(userNameValue).trim() : "User"
                };
              })
              .filter((user) => user.email !== "");

            cleanup();
            resolve(users);
          } catch (error) {
            cleanup();
            reject(error);
          }
        };

        script.onerror = function () {
          cleanup();
          reject(new Error("Unable to load the Google Sheet."));
        };

        const sheetURL =
          "https://docs.google.com/spreadsheets/d/" +
          encodeURIComponent(GOOGLE_SHEET_ID) +
          "/gviz/tq" +
          "?sheet=" +
          encodeURIComponent(GOOGLE_SHEET_NAME) +
          "&headers=1" +
          "&tq=" +
          encodeURIComponent(query) +
          "&tqx=" +
          encodeURIComponent("out:json;responseHandler:" + callbackName) +
          "&cacheBust=" +
          Date.now();

        script.src = sheetURL;
        script.async = true;
        document.body.appendChild(script);
      });
    }

    /*
    ============================================================
    RECORD SUCCESSFUL LOGIN
    ============================================================
    */

    function recordLogin(email) {
      const formData = new URLSearchParams();
      formData.append(LOGIN_EMAIL_ENTRY_ID, email);

      fetch(LOGIN_FORM_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: formData.toString(),
        keepalive: true
      }).catch((error) => {
        console.error("Unable to record login:", error);
      });
    }

    /*
    ============================================================
    LOGIN
    ============================================================
    */

    async function handleLogin(event) {
      event.preventDefault();
      hideError();

      const inputEmail = emailInput.value.trim().toLowerCase();

      if (!inputEmail) {
        showError("Please enter your email address.");
        emailInput.focus();
        return;
      }

      if (!emailInput.checkValidity()) {
        showError("Please enter a valid email address.");
        emailInput.focus();
        return;
      }

      setLoginLoading(true);

      try {
        const users = await getUsersFromGoogleSheet();
        const foundUser = users.find((user) => user.email === inputEmail);

        if (!foundUser) {
          showError("Access denied. This email address is not registered.");
          return;
        }

        recordLogin(foundUser.email);
        openDashboard(foundUser);
      } catch (error) {
        console.error("Login verification error:", error);
        showError("Unable to verify your email. Check the Google Sheet sharing, publishing settings, and tab name.");
      } finally {
        setLoginLoading(false);
      }
    }

    /*
    ============================================================
    OPEN DASHBOARD
    ============================================================
    */

    function openDashboard(user) {
      isLoggedIn = true;

      welcomeMessage.textContent = "Operator: " + (user.userName || "User");
      
      if (pageSelect.options.length > 0) {
        powerBIFrame.src = pageSelect.value;
      }

      loginView.style.display = "none";
      dashboardView.style.display = "flex";
    }

    /*
    ============================================================
    SWITCH REPORT PAGE
    ============================================================
    */

    function handlePageChange(event) {
      const selectedUrl = event.target.value;
      if (selectedUrl) {
        powerBIFrame.src = selectedUrl;
      }
    }

    /*
    ============================================================
    LOGIN BUTTON STATE
    ============================================================
    */

    function setLoginLoading(isLoading) {
      loginButton.disabled = isLoading;
      emailInput.disabled = isLoading;
      loginButton.textContent = isLoading ? "Verifying..." : "Authenticate";
    }

    /*
    ============================================================
    ERROR MESSAGE
    ============================================================
    */

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = "block";
    }

    function hideError() {
      errorMessage.textContent = "";
      errorMessage.style.display = "none";
    }

    /*
    ============================================================
    LOGOUT
    ============================================================
    */

    function logout() {
      isLoggedIn = false;
      powerBIFrame.src = "";
      welcomeMessage.textContent = "System Active";

      dashboardView.style.display = "none";
      loginView.style.display = "flex";

      emailInput.value = "";
      emailInput.disabled = false;

      if (pageSelect.options.length > 0) {
        pageSelect.selectedIndex = 0;
      }

      hideError();
      emailInput.focus();
    }

    /*
    ============================================================
    EVENT LISTENERS
    ============================================================
    */

    loginForm.addEventListener("submit", handleLogin);
    logoutButton.addEventListener("click", logout);
    pageSelect.addEventListener("change", handlePageChange);
  </script>
</body>
</html>
